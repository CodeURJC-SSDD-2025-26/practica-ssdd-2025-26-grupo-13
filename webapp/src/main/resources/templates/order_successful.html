{{>header}}
<div class="container">
    <i class="bi bi-bag-check display-1 mb-1"></i>
    <h1 class="fs-1 fw-bold"> Producto comprado</h1>
    <h1 class="fs-1 fw-bold">correctamente</h1>
    <div class="d-flex flex-wrap gap-2">
        <a href="/" class="button">Volver</a>
        <a href="/buy/{{id}}/ticket" class="button">Descargar factura</a>
    </div>
    <form action="/delete/{{id}}" method="post" class="mt-3" >
        <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">
                <!-- Button trigger modal -->
        <button type="button" class="button bg-danger" data-bs-toggle="modal" data-bs-target="#deleteOrderModal">
            Cancelar pedido
        </button>

        <!-- Modal -->
        <div class="modal fade" id="deleteOrderModal" tabindex="-1" aria-labelledby="deleteOrderModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="deleteOrderModalLabel">Confirmar cancelación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        ¿Estás seguro de que quieres cancelar este pedido? Esta acción no se puede deshacer.
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="button bg-secondary" data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="button bg-danger">Cancelar pedido</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (typeof confetti !== 'function') {
            return;
        }

        function launchConfetti() {
            confetti({
                particleCount: 140,
                spread: 90,
                startVelocity: 35,
                origin: { y: 0.65 }
            });

            confetti({
                particleCount: 90,
                angle: 60,
                spread: 70,
                origin: { x: 0, y: 0.75 }
            });

            confetti({
                particleCount: 90,
                angle: 120,
                spread: 70,
                origin: { x: 1, y: 0.75 }
            });
        }

        launchConfetti();
    });
</script>
{{>footer}}
