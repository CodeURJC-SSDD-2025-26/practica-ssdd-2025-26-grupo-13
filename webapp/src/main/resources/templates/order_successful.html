{{>header}}
<div class="container">
    <i class="bi bi-bag-check display-1 mb-1"></i>
    <h1 class="fs-1 fw-bold"> Producto comprado</h1>
    <h1 class="fs-1 fw-bold">correctamente</h1>
    <div class="d-flex flex-wrap gap-2">
        <a href="/" class="button">Volver</a>
        <a href="/buy/{{id}}/ticket" class="button">Descargar factura</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (typeof confetti !== 'function') {
            return;
        }

        function launchConfetti() {
            confetti({
                particleCount: 140,
                spread: 90,
                startVelocity: 35,
                origin: { y: 0.65 }
            });

            confetti({
                particleCount: 90,
                angle: 60,
                spread: 70,
                origin: { x: 0, y: 0.75 }
            });

            confetti({
                particleCount: 90,
                angle: 120,
                spread: 70,
                origin: { x: 1, y: 0.75 }
            });
        }

        launchConfetti();
    });
</script>
{{>footer}}
