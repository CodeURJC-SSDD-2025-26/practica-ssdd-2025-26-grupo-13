{{>header}}
<main>
  <div class="title">
    <h2>Modifica tus datos</h2>
  </div>
  <div class="category">
    <form role="form" action="/modify_user" method="post" enctype="multipart/form-data">
      <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">
      <div class="d-flex gap-5 flex-wrap justify-content-between ms-sm-2">
        <div class="m-auto position-relative">
          <img
            id="userImagePreview"
            class="rounded-circle"
            src="/images/{{imageUrl}}"
            width="150px"
            alt="Usuario"
          />
          <button
            type="button"
            class="btn btn-sm btn-secondary text position-absolute bottom-0 end-0 rounded-circle p-2"
            style="width: 40px; height: 40px"
            onclick="document.getElementById('userImage').click()"
          >
            <i class="bi bi-pencil-fill"></i>
          </button>
          <input
            type="file"
            class="form-control mt-2"
            id="userImage"
            name="image"
            style="display: none"
          />
        </div>
        <div class="flex-grow-1">
          <div class="mb-3">
            <input type="hidden" name="id" value="{{user.id}}" />
            <label for="name" class="form-label">Nombre</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              value="{{user.name}}"
              required
            />
          </div>
          <div class="mb-3">
            <label for="surname" class="form-label">Apellidos</label>
            <input
              type="text"
              class="form-control"
              id="surname"
              name="surnames"
              value="{{user.surnames}}"
              required
            />
          </div>
        </div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          value="{{user.email}}"
          required
        />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
        />
      </div>
      <div class="form-group">
        <label for="inputAddress">Dirección</label>
        <div id="autocomplete-container"></div>
        <input type="hidden" id="latitude" name="latitude" value="{{#user.location}} {{user.location.latitude}} {{/user.location}} "/>
        <input type="hidden" id="longitude" name="longitude" value="{{#user.location}} {{user.location.longitude}} {{/user.location}} "/>
        <input type="hidden" id="formatted-address" name="city" value="{{#user.location}} {{user.location.name}} {{/user.location}} "/>
        <br/>
      </div>
      <button class="button" type="submit">Modificar</button>
    </form>
    <form action="/delete_user" method="post" class="mt-3">
      <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">
      <input type="hidden" name="id" value="{{user.id}}" />
               <!-- Button trigger modal -->
        <button type="button" class="button bg-danger" data-bs-toggle="modal" data-bs-target="#deleteUserModal">
            Eliminar cuenta
        </button>
        <!-- Modal -->
        <div class="modal fade" id="deleteUserModal" tabindex="-1" aria-labelledby="deleteUserModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="deleteUserModalLabel">Confirmar eliminación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        ¿Estás seguro de que quieres eliminar esta cuenta? Esta acción no se puede deshacer.
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="button bg-secondary" data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="button bg-danger">Eliminar cuenta</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
  </div>
</main>

<script>
        document.getElementById("userImage").addEventListener("change", (event) => {
            const [file] = event.target.files;
            if (!file) return;
            document.getElementById("userImagePreview").src = URL.createObjectURL(file);
        });

        async function initAutocomplete() {
            const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");

            const autocompleteElement = new PlaceAutocompleteElement({
                includedRegionCodes: ["es"],
                includedPrimaryTypes: ["locality"]
            });
            autocompleteElement.style.colorScheme = "light";
            autocompleteElement.style.borderRadius = "15px";
            autocompleteElement.style.border = "1px solid #dee2e6";

            document.getElementById("autocomplete-container").appendChild(autocompleteElement);

            autocompleteElement.addEventListener("gmp-select", async (event) => {
                const place = event.placePrediction.toPlace();

                await place.fetchFields({
                    fields: ["formattedAddress", "location"]
                });

                document.getElementById("latitude").value = place.location.lat();
                document.getElementById("longitude").value = place.location.lng();
                document.getElementById("formatted-address").value = place.formattedAddress;
            });
        }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key={{mapsApiKey}}&libraries=places&v=weekly&callback=initAutocomplete"></script>

{{>footer}}
