{{>header}}
<main>
  <div class="category">
    <h4>Modificar reseña</h4>
    <form role="form" action="/change_review" method="Post" id="review-form">
      <input type="hidden" name="id" value="{{review.id}}" />
      <div class="d-flex flex-wrap gap-2 mt-3">
        <p class="fw-semibold">Usuario:</p>
        <p>{{review.user.name}}</p>
      </div>
      <div class="d-flex flex-wrap gap-2 mb-3">
        <p class="fw-semibold">Producto:</p>
        <p>{{review.product.name}}</p>
      </div>
      <div class="mb-3">
        <label for="reviewDescription" class="form-label">Información</label> 
        <textarea class="form-control" name="description" id="reviewDescription" rows="3" required>{{review.description}}</textarea>
      </div>
      <!-- Star rating system -->
      <p class="form-label mb-0">Valoración por estrellas</p>
      <div
        id="star-rating"
        style="font-size: 2rem; color: #ffc107; cursor: pointer"
      >
        <span class="star" data-value="1">&#9734;</span>
        <span class="star" data-value="2">&#9734;</span>
        <span class="star" data-value="3">&#9734;</span>
        <span class="star" data-value="4">&#9734;</span>
        <span class="star" data-value="5">&#9734;</span>
        <input type="hidden" name="rating" id="rating-value" value="{{initialRating}}" />
      </div>
      <br />
      <div class="d-flex flex-wrap gap-2">
        <button class="button me-2" type="submit">Publicar</button>
        <a href="/delete_review/{{review.id}}" class="button">Eliminar reseña</a>
      </div>
    </form>
  </div>
  <script>
    const reviewForm = document.getElementById("review-form");
    const stars = document.querySelectorAll("#star-rating .star");
    const ratingValue = document.getElementById("rating-value");
    let currentRating = Number(ratingValue.value) || 0;

    stars.forEach((star, idx) => {
      star.addEventListener("mouseover", () => {
        highlightStars(idx + 1);
      });
      star.addEventListener("mouseout", () => {
        highlightStars(currentRating);
      });
      star.addEventListener("click", () => {
        currentRating = idx + 1;
        ratingValue.value = currentRating;
        highlightStars(currentRating);
      });
    });

    function highlightStars(rating) {
      stars.forEach((star, idx) => {
        star.innerHTML = idx < rating ? "&#9733;" : "&#9734;";
      });
    }

    reviewForm.addEventListener("submit", (event) => {
      if (currentRating < 1) {
        event.preventDefault();
        alert("Selecciona una valoración entre 1 y 5 estrellas.");
      }
    });

    highlightStars(currentRating);
  </script>
</main>
{{>footer}}
